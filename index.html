<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Page</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 330px; text-align: center; }
        
        /* নোটিশ এর স্টাইল */
        .notice-box { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; border: 1px solid #ffeeba; font-weight: bold; }
        
        .amount-tag { font-size: 32px; font-weight: bold; color: #d63384; margin: 10px 0; }
        .method-btn { padding: 8px 15px; border: 1px solid #ddd; cursor: pointer; border-radius: 5px; margin: 5px; display: inline-block; }
        .active { background: #d63384; color: white; border-color: #d63384; }
        .num-box { background: #f8f9fa; padding: 12px; margin: 15px 0; font-weight: bold; border-radius: 8px; font-size: 18px; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <!-- এডমিন থেকে আসা নোটিশ এখানে দেখাবে -->
    <div class="notice-box" id="displayNotice">Loading announcement...</div>
    
    <div class="amount-tag" id="displayAmt">৳0</div>
    <p style="font-size: 13px; color: #666;">নিচের নাম্বারে টাকা পাঠিয়ে TrxID দিন।</p>
    
    <div>
        <span id="bBtn" class="method-btn active" onclick="changeMethod('Bkash')">Bkash</span>
        <span id="nBtn" class="method-btn" onclick="changeMethod('Nagad')">Nagad</span>
    </div>

    <div class="num-box" id="displayNum">Loading...</div>

    <input type="text" id="trxID" placeholder="Enter Transaction ID (TrxID)">
    <button class="submit-btn" onclick="sendRequest()">Confirm Deposit</button>
    <p id="msg" style="font-size: 12px; color: green; margin-top: 10px;"></p>
</div>

<script>
    // আপনার ফায়ারবেস কনফিগারেশন এখানে দিন (Admin ফাইলের মতো একই)
    const firebaseConfig = {
  apiKey: "AIzaSyB1Pa3_ocRAWhfSxrlSXHX8fTvZAgj1A6w",
  authDomain: "git-copy-ff-trm.firebaseapp.com",
  databaseURL: "https://git-copy-ff-trm-default-rtdb.firebaseio.com",
  projectId: "git-copy-ff-trm",
  storageBucket: "git-copy-ff-trm.firebasestorage.app",
  messagingSenderId: "926747365301",
  appId: "1:926747365301:web:9e304003727d1a128393fc",
  measurementId: "G-1RBZYNG1DZ"
};

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentSettings = {};
    let selectedMethod = "Bkash";

    // এডমিন থেকে সেটিংস রিয়েল-টাইম লোড করা
    database.ref('settings').on('value', (snap) => {
        currentSettings = snap.val();
        if(currentSettings) {
            document.getElementById('displayNotice').innerText = currentSettings.notice || "Deposit Now";
            document.getElementById('displayAmt').innerText = "৳" + (currentSettings.amount || 0);
            updateUI();
        }
    });

    function changeMethod(m) {
        selectedMethod = m;
        document.getElementById('bBtn').className = (m === 'Bkash') ? 'method-btn active' : 'method-btn';
        document.getElementById('nBtn').className = (m === 'Nagad') ? 'method-btn active' : 'method-btn';
        updateUI();
    }

    function updateUI() {
        if(currentSettings) {
            document.getElementById('displayNum').innerText = (selectedMethod === 'Bkash') ? currentSettings.bkash : currentSettings.nagad;
        }
    }

    function sendRequest() {
        const trx = document.getElementById('trxID').value;
        if(!trx) return alert("অনুগ্রহ করে TrxID দিন!");

        database.ref('deposits').push({
            amount: currentSettings.amount,
            method: selectedMethod,
            trxID: trx,
            status: "Pending",
            time: Date.now()
        }).then(() => {
            document.getElementById('msg').innerText = "✅ রিকোয়েস্ট সফলভাবে পাঠানো হয়েছে!";
            document.getElementById('trxID').value = "";
        });
    }
</script>
</body>
</html>
