<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Money</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .pay-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .amount-display { font-size: 32px; font-weight: bold; color: #d63384; margin: 10px 0; }
        .info-text { font-size: 14px; color: #555; margin-bottom: 20px; }
        .method-box { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .method-item { cursor: pointer; border: 1px solid #ddd; padding: 10px; border-radius: 8px; width: 40%; }
        .method-item.active { border-color: #d63384; background: #fff0f6; }
        .wallet-num { background: #f8f9fa; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 18px; margin-bottom: 15px; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #d63384; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="pay-card">
    <h3 style="margin: 0;">Payment Required</h3>
    <div class="amount-display" id="showAmount">৳0.00</div>
    <p class="info-text">নিচের যেকোনো একটি মেথডে টাকা পাঠিয়ে TrxID দিন।</p>

    <div class="method-box">
        <div class="method-item active" id="bBtn" onclick="setMethod('Bkash')">Bkash</div>
        <div class="method-item" id="nBtn" onclick="setMethod('Nagad')">Nagad</div>
    </div>

    <div class="wallet-num" id="showNumber">Loading...</div>

    <input type="text" id="trxID" placeholder="Enter Transaction ID">
    <button class="btn-submit" onclick="submitPay()">Confirm Deposit</button>
    <p id="msg" style="color: green; font-size: 13px; margin-top: 10px;"></p>
</div>

<script>
    // Get settings from Admin
    let settings = JSON.parse(localStorage.getItem('paymentSettings')) || { amount: 0, bkash: "Not Set", nagad: "Not Set" };
    let currentMethod = "Bkash";

    // Display the Fixed Amount
    document.getElementById('showAmount').innerText = "৳" + settings.amount;
    document.getElementById('showNumber').innerText = settings.bkash;

    function setMethod(m) {
        currentMethod = m;
        document.getElementById('bBtn').classList.toggle('active', m === 'Bkash');
        document.getElementById('nBtn').classList.toggle('active', m === 'Nagad');
        document.getElementById('showNumber').innerText = (m === 'Bkash') ? settings.bkash : settings.nagad;
    }

    function submitPay() {
        const trx = document.getElementById('trxID').value;
        if(trx === "") { alert("TrxID দিন!"); return; }

        let deposits = JSON.parse(localStorage.getItem('deposits')) || [];
        deposits.push({
            id: Date.now(),
            amount: settings.amount, // Admin set fixed amount
            method: currentMethod,
            trxID: trx,
            status: "Pending"
        });

        localStorage.setItem('deposits', JSON.stringify(deposits));
        document.getElementById('msg').innerText = "✅ রিকোয়েস্ট পাঠানো হয়েছে!";
        document.getElementById('trxID').value = "";
    }
</script>

</body>
  </html>
